<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Maskable: background fills the full canvas edge-to-edge; the mark stays inside the
       ~80% "safe zone" so OS icon masks (circle, squircle, etc.) never clip it. -->
